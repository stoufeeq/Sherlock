asyncapi: 2.6.0
info:
  title: Customer Service Events
  version: 1.0.0
servers:
  redpanda:
    url: redpanda:29092
    protocol: kafka
channels:
  banking.customers.updated:
    publish:
      operationId: publishCustomerUpdated
      message:
        name: CustomerUpdatedEvent
        contentType: application/json
        payload:
          type: object
          required: [customerId, fieldChanged, occurredAt]
          properties:
            customerId: { type: string }
            fieldChanged: { type: string }
            oldValue: { type: string }
            newValue: { type: string }
            occurredAt: { type: string, format: date-time }
