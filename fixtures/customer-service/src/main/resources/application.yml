server:
  port: 8080

spring:
  application:
    name: customer-service
  datasource:
    url: jdbc:postgresql://postgres:5432/banking?currentSchema=customers
    username: ${DB_USER:banking}
    password: ${DB_PASSWORD:banking}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    schemas: customers
    default-schema: customers
  kafka:
    bootstrap-servers: ${KAFKA_BROKER:redpanda:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
